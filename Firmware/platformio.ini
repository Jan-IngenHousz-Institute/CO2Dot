; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uart            ; build target when none is specified

[env]                         ; shared by every env below
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
  https://github.com/boschsensortec/Bosch-BME68x-Library.git
  https://github.com/adafruit/Adafruit_AS7341.git
  https://github.com/bblanchon/ArduinoJson.git
build_flags =
  -DDEBUG=0

; ── PCB variant: USB-C wired directly to GPIO18/19 (native USB-CDC) ─────────
[env:usb]
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSB_VID=0x16C0
  -DUSB_PID=0x0483
  '-DUSB_MANUFACTURER="Espressif"'
  '-DUSB_PRODUCT="CO2Dot"'

; ── PCB variant: external USB-UART debugger on GPIO20/21 ────────────────────
[env:uart]
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
upload_protocol = esptool
upload_speed    = 921600
; If you have multiple COM ports plugged in, pin them to avoid the wrong one:
; upload_port  = COM7
; monitor_port = COM7
