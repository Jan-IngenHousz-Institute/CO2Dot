name: Build GUI

on:
  push:
    paths:
      - 'Firmware/gui/**'
  pull_request:
    paths:
      - 'Firmware/gui/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Firmware/gui/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          cd Firmware/gui
          pyinstaller --onefile --windowed --name CO2Dot-Controller --collect-all PySide6 main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CO2Dot-Controller-${{ matrix.os }}
          path: Firmware/gui/dist/
